<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    .filtros {
      background: #f5f5f5;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 5px;
    }
    .filtros input,
    .filtros select {
      padding: 8px;
      margin-right: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
    }
    .productos {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
    }
    .producto {
      border: 1px solid #ddd;
      padding: 15px;
      border-radius: 5px;
    }
    .producto h3 {
      margin: 0 0 10px 0;
      color: #333;
    }
    .producto .category {
      color: #666;
      font-size: 0.9em;
    }
    .producto .price {
      font-size: 1.3em;
      color: #007bff;
      font-weight: bold;
      margin: 10px 0;
    }
    .sin-resultados {
      text-align: center;
      padding: 40px;
      color: #666;
    }
    #contador {
      margin-bottom: 15px;
      font-weight: bold;
    }
  </style>

  <body>
    <h1>Tienda Online</h1>

    <div class="filtros">
      <input
        type="text"
        id="buscador"
        placeholder="Buscar producto..."
        autocomplete="off"
      />

      <select id="category">
        <option value="todas">Todas las categorías</option>
        <option value="ropa">Ropa</option>
        <option value="electronica">Electrónica</option>
        <option value="hogar">Hogar</option>
      </select>

      <input
        type="number"
        id="priceMax"
        placeholder="price máximo"
        min="0"
        value="1000"
      />
    </div>

    <div id="contador">
      Productos encontrados: <span id="numResultados">0</span>
    </div>

    <div class="productos" id="productos"></div>

    <script>
      // Array de productos
      const products = [
        { id: 1, name: "Camisa", category: "ropa", price: 25 },
        { id: 2, name: "Camisa Negra", category: "ropa", price: 25 },
        { id: 2, name: "Pantalón", category: "ropa", price: 35 },
        { id: 3, name: "Laptop", category: "electronica", price: 800 },
        { id: 4, name: "Mouse", category: "electronica", price: 25 },
        { id: 5, name: "Sartén", category: "hogar", price: 30 },
        { id: 6, name: "Mesa", category: "hogar", price: 150 },
        { id: 7, name: "Vestido", category: "ropa", price: 45 },
        { id: 8, name: "Teléfono", category: "electronica", price: 300 },
      ];

      let filterdProducts = [...products];

      // Seleccionar los elementos del DOM
      const inputSearch = document.querySelector("#buscador");
      const categorySearch = document.getElementById("category");
      const inputPriceSearch = document.getElementById("priceMax");
      const countProducts = document.getElementById("numResultados");
      const containerProductsSearch = document.getElementById("productos");

      inputSearch.addEventListener("input", filterdProductsFunction);
      categorySearch.addEventListener("change", filterdProductsFunction);
      inputPriceSearch.addEventListener("input", filterdProductsFunction);

      filterdProductsFunction();

      function filterdProductsFunction() {
        const textSearch = inputSearch.value.toLowerCase(); // c
        const categorySelected = categorySearch.value; // todas
        const priceSearch = parseFloat(inputPriceSearch.value);

        const arrayFiltered = products.filter((product) => {
          // Filtrar por texto
          const filterText = product.name.toLowerCase().includes(textSearch);

          // Filtrar por categoria
          const filterCategory =
            categorySelected === "todas" ||
            product.category === categorySelected;

          // Filtrar por precio
          const filterPrice = product.price <= priceSearch;

          return filterText && filterCategory && filterPrice;
        });

        countProducts.textContent = arrayFiltered.length;

        showProductsFilteredHtml(arrayFiltered);
      }
      function showProductsFilteredHtml(arrayProducts) {
        // Mostramos los productos filtrados en mi html
        containerProductsSearch.innerHTML = "";
        arrayProducts.forEach((product) => {
          const divProduct = document.createElement("div");
          divProduct.classList.add("producto");

          divProduct.innerHTML = `
            <h3>${product.name}</h3>
            <div class="categoria">${product.category}</div>
            <div class="precio">$${product.price}</div>
          `;

          containerProductsSearch.appendChild(divProduct);
        });
      }
    </script>
  </body>
</html>
