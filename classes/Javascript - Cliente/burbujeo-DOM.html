<!doctype html>
<html>
  <head>
    <title>Events</title>

    <style>
      div {
        text-align: center;
        max-width: 150px;
        border: 2px solid tomato;
        padding: 0.5rem;
        margin: 0.5rem;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="div1">
      DIV 1
      <div class="div2">
        DIV 2
        <div class="div3">DIV 3</div>
      </div>

      <div class="div4" onclick="alert('DIV 4 recibió el click')">DIV 4</div>
    </div>

    <script>
      const div1 = document.querySelector(".div1");
      const div2 = document.querySelector(".div2");
      const div3 = document.querySelector(".div3");

      div1.addEventListener("click", () => {
        alert("DIV 1 recibió el click");
      });

      div2.addEventListener("click", () => {
        alert("DIV 2 recibió el click");
      });

      div3.addEventListener("click", (event) => {
        alert("DIV 3 recibió el click");
        event.stopPropagation();
      });
    </script>
  </body>
</html>
